<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Grayscale Sites — Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #e0e0e0;
      background: #111;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 48px 24px;
    }
    .container {
      width: 100%;
      max-width: 520px;
    }
    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .subtitle {
      color: #888;
      font-size: 13px;
      margin-bottom: 32px;
    }

    /* Sections */
    .section {
      margin-bottom: 28px;
    }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #666;
      margin-bottom: 10px;
    }

    /* Global toggle */
    .global-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1a1a1a;
      border: 1px solid #282828;
      border-radius: 10px;
      padding: 14px 16px;
    }
    .global-row span { font-size: 14px; }
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      cursor: pointer;
    }
    .toggle input { display: none; }
    .toggle .slider {
      position: absolute;
      inset: 0;
      background: #444;
      border-radius: 12px;
      transition: background 0.2s;
    }
    .toggle .slider::before {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .slider { background: #4a9eff; }
    .toggle input:checked + .slider::before { transform: translateX(20px); }

    /* Add site */
    .add-row {
      display: flex;
      gap: 8px;
    }
    input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #333;
      border-radius: 8px;
      font-size: 14px;
      background: #1a1a1a;
      color: #e0e0e0;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: #4a9eff; }
    input[type="text"]::placeholder { color: #555; }
    .add-btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      background: #4a9eff;
      color: #fff;
      font-weight: 500;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .add-btn:hover { background: #3a8eef; }

    /* Site list */
    .site-list {
      list-style: none;
      margin-top: 12px;
    }
    .site-list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: #1a1a1a;
      border: 1px solid #282828;
      border-radius: 8px;
      margin-bottom: 6px;
      transition: border-color 0.15s;
    }
    .site-list li:hover { border-color: #383838; }
    .site-list li .domain {
      font-size: 14px;
      font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
    }
    .remove-btn {
      background: none;
      border: 1px solid transparent;
      color: #666;
      font-size: 12px;
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 6px;
      transition: all 0.15s;
    }
    .remove-btn:hover {
      color: #ff4a4a;
      background: rgba(255, 74, 74, 0.1);
      border-color: rgba(255, 74, 74, 0.2);
    }
    .empty {
      color: #555;
      text-align: center;
      padding: 32px 0;
      font-size: 13px;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #2a2a2a;
      border: 1px solid #383838;
      color: #e0e0e0;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Grayscale Sites</h1>
    <p class="subtitle">Websites in this list will render in black & white.</p>

    <div class="section">
      <div class="section-title">General</div>
      <div class="global-row">
        <span>Enable grayscale filter</span>
        <label class="toggle">
          <input type="checkbox" id="globalToggle" checked>
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Websites</div>
      <div class="add-row">
        <input type="text" id="siteInput" placeholder="Add a domain, e.g. reddit.com">
        <button class="add-btn" id="addBtn">Add</button>
      </div>
      <ul class="site-list" id="siteList"></ul>
      <div class="empty" id="emptyMsg">No sites added yet. Add a domain above to get started.</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="options.js"></script>
</body>
</html>
