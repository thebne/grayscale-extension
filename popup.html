<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #e0e0e0;
      background: #1a1a1a;
      padding: 14px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .header h1 {
      font-size: 14px;
      font-weight: 600;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .settings-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px;
      display: flex;
      align-items: center;
      color: #888;
      transition: color 0.15s;
    }
    .settings-btn:hover { color: #e0e0e0; }
    .settings-btn svg { width: 16px; height: 16px; }
    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
      cursor: pointer;
    }
    .toggle input { display: none; }
    .toggle .slider {
      position: absolute;
      inset: 0;
      background: #444;
      border-radius: 11px;
      transition: background 0.2s;
    }
    .toggle .slider::before {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .slider { background: #4a9eff; }
    .toggle input:checked + .slider::before { transform: translateX(18px); }

    .current-site {
      margin-bottom: 10px;
    }
    .current-site button {
      width: 100%;
      padding: 9px 12px;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      background: #252525;
      color: #ccc;
      transition: all 0.15s;
      text-align: left;
    }
    .current-site button:hover { background: #303030; }
    .current-site button.active {
      background: #4a9eff;
      color: #fff;
    }
    .current-site button.active:hover { background: #3a8eef; }

    .divider {
      border: none;
      border-top: 1px solid #282828;
      margin: 10px 0;
    }
    .site-count {
      font-size: 11px;
      color: #666;
      text-align: center;
    }
    .site-count a {
      color: #4a9eff;
      text-decoration: none;
      cursor: pointer;
    }
    .site-count a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Grayscale Sites</h1>
    <div class="header-actions">
      <button class="settings-btn" id="settingsBtn" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
      <label class="toggle">
        <input type="checkbox" id="globalToggle" checked>
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="current-site" id="currentSiteSection" style="display:none">
    <button id="toggleCurrentBtn"></button>
  </div>

  <hr class="divider">
  <div class="site-count" id="siteCount"></div>

  <script src="popup.js"></script>
</body>
</html>
